report:
  title: "RecoMart: An End-to-End MLOps Pipeline for Product Recommendation"
  subtitle: "Design and Initial Implementation Report"
  version: "1.0"
  author: "RecoMart Project Team"
  submission_date: "To be updated before submission"
  output_path: "reports/recomart_project_report_v1.pdf"

institution:
  name: "Birla Institute of Technology and Science, Pilani"
  course: "Data Management for Deep Learning"
  academic_term: "Second Semester"

